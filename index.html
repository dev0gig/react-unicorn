<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/react-unicorn/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicorn</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "@dnd-kit/core": "https://esm.sh/@dnd-kit/core@^6.1.0",
    "@dnd-kit/sortable": "https://esm.sh/@dnd-kit/sortable@^8.0.0",
    "@dnd-kit/utilities": "https://esm.sh/@dnd-kit/utilities@^3.2.2",
    "react-dom": "https://esm.sh/react-dom@^19.1.1",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
    "rehype-raw": "https://esm.sh/rehype-raw@^7.0.0",
    "jszip": "https://esm.sh/jszip@3.10.1"
  }
}
</script>
  <style>
    /* Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: var(--scrollbar-hover); }
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar) transparent;
      scrollbar-gutter: stable;
      overflow-x: hidden;
    }

    /* Markdown Content */
    .markdown-content mark {
      background-color: var(--mark-bg);
      color: var(--mark-text);
      padding: 0.1em 0.3em;
      border-radius: 4px;
    }
    .markdown-content .note-tag {
      background-color: var(--note-tag-bg);
      color: var(--accent-text);
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-weight: 500;
    }
    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3,
    .markdown-content h4,
    .markdown-content h5,
    .markdown-content h6 {
      font-weight: 600;
      margin-bottom: 0.5em;
      margin-top: 1em;
      color: var(--text-primary);
    }
    .markdown-content h1 { font-size: 1.875rem; }
    .markdown-content h2 { font-size: 1.5rem; }
    .markdown-content h3 { font-size: 1.25rem; }
    .markdown-content p { margin-bottom: 1em; color: var(--text-body); }
    .markdown-content p:last-child { margin-bottom: 0; }
    .markdown-content a { color: var(--accent-text); text-decoration: underline; }
    .markdown-content a:hover { color: var(--accent-light); }
    .markdown-content ul,
    .markdown-content ol {
      list-style-position: outside;
      padding-left: 1.5em;
      margin-bottom: 1em;
      color: var(--text-body);
    }
    .markdown-content li { margin-bottom: 0.35em; }
    .markdown-content code {
      background-color: var(--bg-surface);
      padding: 0.2em 0.4em;
      border-radius: 4px;
      font-family: monospace;
      color: var(--code-text);
    }
    .markdown-content pre {
      background-color: var(--bg-page);
      padding: 1em;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    .markdown-content pre code { padding: 0; background-color: transparent; border: none; }
    .markdown-content blockquote {
      border-left: 4px solid var(--border-muted);
      padding-left: 1em;
      color: var(--text-muted);
      margin-left: 0;
      margin-bottom: 1em;
    }
    .markdown-content table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }
    .markdown-content th,
    .markdown-content td {
      border: 1px solid var(--border-muted);
      padding: 0.5em 1em;
      text-align: left;
    }
    .markdown-content th {
      background-color: var(--bg-muted);
      font-weight: 600;
      color: var(--text-primary);
    }
    .markdown-content hr { border-top: 1px solid var(--border-muted); margin: 1.5em 0; }

    /* Tile View */
    .tile-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fill, 120px);
      grid-auto-rows: 120px;
      grid-auto-flow: dense;
    }
    .tile-wrapper { display: flex; }
    .tile-wrapper.size-1x1 { grid-column: span 1; grid-row: span 1; }
    .tile {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, background-color 0.15s;
      user-select: none;
      color: var(--tile-text);
      width: 100%;
      height: 100%;
      border: 1px solid var(--tile-border);
      background: var(--tile-bg);
    }
    .tile:hover {
      border-color: var(--tile-border-hover);
      background: var(--tile-bg-hover);
    }
    .tile-icon {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 24px;
      opacity: 0.9;
    }
    .tile .favorite-star {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 20px;
      color: var(--star-active);
      z-index: 5;
      pointer-events: none;
    }
    .tile-group-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      line-height: 1.2;
      opacity: 0.8;
      margin-bottom: 2px;
      word-break: break-word;
    }
    .tile-label {
      display: block;
      font-weight: 500;
      line-height: 1.3;
      word-break: break-word;
    }

    /* Highlight Animations */
    @keyframes highlight-agenda-day {
      0% { background-color: transparent; }
      50% { background-color: var(--highlight); }
      100% { background-color: transparent; }
    }
    .highlight-agenda-day { animation: highlight-agenda-day 5s ease-out; border-radius: 6px; }

    @keyframes highlight-note-animation {
      0% { background-color: transparent; }
      50% { background-color: var(--highlight-strong); }
      100% { background-color: transparent; }
    }
    .highlight-note { animation: highlight-note-animation 3s ease-out; border-radius: 8px; }

    /* Hide scrollbar */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Snowfall Animation */
    @keyframes snowfall {
      0% { transform: translateY(-10vh) translateX(0); }
      25% { transform: translateY(25vh) translateX(15px); }
      50% { transform: translateY(50vh) translateX(-15px); }
      75% { transform: translateY(75vh) translateX(15px); }
      100% { transform: translateY(110vh) translateX(0); }
    }
    .snowflake {
      position: fixed;
      top: -10px;
      color: white;
      user-select: none;
      z-index: 9999;
      pointer-events: none;
      animation: snowfall linear infinite;
    }

    /* View Padding */
    :root { --view-padding: 1.5rem; }

    /* ==============================================
       TAILWIND CLASS OVERRIDES (non-dark themes)
       All values from theme.css variables
       ============================================== */
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-950,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-900,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-900\/20 { background-color: var(--bg-page) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-800,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-800\/90,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-800\/60,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-800\/50 { background-color: var(--bg-surface) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-700,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-700\/50,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-600 { background-color: var(--bg-muted) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .bg-white\/5 { background-color: var(--bg-surface) !important; }

    /* Text */
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-100 { color: var(--text-primary) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-200 { color: var(--text-secondary) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-300 { color: var(--text-body) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-400 { color: var(--text-muted) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-500,
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-600,
    :is([data-theme="light"], [data-theme="sepia"]) .text-neutral-700 { color: var(--text-faint) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-700.text-white,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-800.text-white,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-neutral-900.text-white { color: var(--text-on-muted) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .text-white\/80,
    :is([data-theme="light"], [data-theme="sepia"]) .text-white\/90 { color: var(--text-body) !important; }

    :is([data-theme="light"], [data-theme="sepia"]) .text-red-300,
    :is([data-theme="light"], [data-theme="sepia"]) .text-red-400 { color: var(--danger) !important; }

    /* Borders */
    :is([data-theme="light"], [data-theme="sepia"]) .border-neutral-700,
    :is([data-theme="light"], [data-theme="sepia"]) .border-neutral-700\/50,
    :is([data-theme="light"], [data-theme="sepia"]) .border-white\/10 { border-color: var(--border) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .border-neutral-600 { border-color: var(--border-muted) !important; }

    /* Accent */
    :is([data-theme="light"], [data-theme="sepia"]) .bg-orange-500 { background-color: var(--accent) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .bg-orange-600,
    :is([data-theme="light"], [data-theme="sepia"]) .bg-orange-700 { background-color: var(--accent-hover) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .text-orange-400,
    :is([data-theme="light"], [data-theme="sepia"]) .text-orange-500 { color: var(--accent-text) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .border-orange-500 { border-color: var(--accent) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .ring-orange-500 { --tw-ring-color: var(--accent) !important; }

    /* Hover */
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-neutral-700:hover,
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-neutral-700\/50:hover,
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-neutral-600:hover { background-color: var(--bg-muted) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:text-neutral-100:hover { color: var(--text-primary) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-orange-500:hover { background-color: var(--accent) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-orange-600:hover,
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-orange-700:hover { background-color: var(--accent-hover) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:text-white:hover { color: var(--text-primary) !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-orange-500.hover\:text-white:hover,
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-red-500.hover\:text-white:hover,
    :is([data-theme="light"], [data-theme="sepia"]) .hover\:bg-red-600.hover\:text-white:hover { color: var(--on-accent) !important; }

    /* Focus */
    :is([data-theme="light"], [data-theme="sepia"]) .focus\:ring-orange-500:focus { --tw-ring-color: var(--accent) !important; }

    /* Shadows → flat: none */
    :is([data-theme="light"], [data-theme="sepia"]) .shadow-2xl,
    :is([data-theme="light"], [data-theme="sepia"]) .shadow-lg,
    :is([data-theme="light"], [data-theme="sepia"]) .shadow-md,
    :is([data-theme="light"], [data-theme="sepia"]) .shadow-inner { box-shadow: none !important; }
    :is([data-theme="light"], [data-theme="sepia"]) .shadow-orange-900\/10 { --tw-shadow-color: transparent !important; }

    /* Backdrop */
    :is([data-theme="light"], [data-theme="sepia"]) .bg-black\/60 { background-color: var(--backdrop) !important; }

    /* Tile icon */
    :is([data-theme="light"], [data-theme="sepia"]) .tile-icon { opacity: 0.7; }

    /* View padding utilities */
    .view-p { padding: var(--view-padding); }
    .view-px { padding-left: var(--view-padding); padding-right: var(--view-padding); }
    .view-py { padding-top: var(--view-padding); padding-bottom: var(--view-padding); }
    .view-pt { padding-top: var(--view-padding); }
    .view-pb { padding-bottom: var(--view-padding); }
    .view-pl { padding-left: var(--view-padding); }
    .view-pr { padding-right: var(--view-padding); }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
